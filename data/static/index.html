<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG 文档问答</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #f7faff;
      --border: #dbe5f1;
      --text: #1c2434;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #e8f0ff;
      --success: #15803d;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #dbeafe 0, transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: var(--primary-soft);
      color: #183f96;
    }

    .secondary:hover {
      background: #dce7ff;
    }

    .ghost {
      background: #f1f5f9;
      color: #334155;
    }

    .ghost:hover {
      background: #e2e8f0;
    }

    .danger-button {
      background: var(--danger-soft);
      color: #b91c1c;
    }

    .danger-button:hover {
      background: #fecaca;
    }

    input[type="file"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="file"]:focus,
    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #90b3ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.7;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      overflow: hidden;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
    }

    .topbar p {
      margin: 0;
      max-width: 680px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .topbar-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .switch-button {
      min-width: 72px;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
    }

    .switch-button.active {
      background: var(--primary);
      color: #fff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(92px, 1fr));
      gap: 8px;
      min-width: 290px;
    }

    .stat-card {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel-alt);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    .workspace {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: hidden;
    }

    .view {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view.hidden {
      display: none;
    }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-alt);
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .panel-header p {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 18px 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-weight: 600;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .count,
    .hint,
    .meta,
    .section-meta {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .status {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .chip-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: #274265;
      cursor: pointer;
      font-size: 13px;
    }

    .chip:hover {
      background: #f3f7ff;
    }

    .chip.active {
      border-color: #8db2ff;
      background: var(--primary-soft);
      color: #183f96;
      font-weight: 700;
    }

    .file-list,
    .session-list,
    .conversation-list,
    .sources-list {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .file-list,
    .session-list,
    .sources-list {
      display: grid;
      gap: 10px;
      grid-auto-rows: max-content;
      align-content: start;
    }

    .file-list {
      flex: 0 0 420px;
      max-height: 420px;
    }

    .file-item,
    .session-item,
    .source-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
    }

    .file-item {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .file-item.selected {
      border-color: #8db2ff;
      background: #f5f9ff;
    }

    .file-select {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      cursor: pointer;
    }

    .file-select input {
      margin-top: 4px;
    }

    .file-name {
      margin-bottom: 6px;
      font-weight: 700;
      word-break: break-word;
    }

    .file-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      word-break: break-word;
    }

    .file-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chat-workspace {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(240px, 280px) minmax(0, 1fr);
      gap: 14px;
    }

    .library-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      overflow: hidden;
    }

    .library-layout .panel,
    .library-layout .panel-body {
      min-height: 0;
    }

    .library-layout .panel-body {
      overflow: hidden;
    }

    .library-file-section {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .library-file-section .file-list {
      flex: 1;
      max-height: none;
    }

    .session-panel .panel-body {
      padding-top: 14px;
    }

    .session-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .session-actions .primary {
      flex: 1 1 100%;
      padding: 11px 14px;
      border-radius: 16px;
    }

    .session-actions .ghost,
    .session-actions .secondary {
      flex: 1 1 calc(50% - 4px);
      padding: 9px 12px;
    }

    .session-list {
      flex: 1;
      min-height: 0;
    }

    .session-item {
      width: 100%;
      padding: 14px 14px 14px 16px;
      text-align: left;
      background: #fff;
      color: inherit;
      box-shadow: var(--shadow-soft);
      border-left: 3px solid transparent;
    }

    .session-item.active {
      border-color: #8db2ff;
      border-left-color: var(--primary);
      background: #eef4ff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.12);
    }

    .session-item:hover {
      background: #f8fbff;
    }

    .session-title {
      margin-bottom: 6px;
      font-weight: 700;
      word-break: break-word;
    }

    .session-preview {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      word-break: break-word;
    }

    .chat-panel .panel-body {
      flex: 1;
      min-height: 0;
      padding: 0;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-alt);
    }

    .chat-header h2 {
      margin: 0 0 4px;
      font-size: 19px;
    }

    .chat-header p {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .chat-meta-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .chat-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .message-pane {
      flex: 1;
      min-height: 0;
      padding: 18px 18px 12px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(219, 234, 254, 0.4), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    #conversationBox {
      min-height: 0;
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .conversation-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message-card {
      max-width: min(84%, 860px);
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .message-card.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #f1f6ff 0%, #e8f0ff 100%);
      border-color: #bfd2ff;
    }

    .message-card.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.96);
    }

    .message-role {
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #1d4ed8;
    }

    .message-card.assistant .message-role {
      color: #0f766e;
    }

    .message-content {
      white-space: pre-wrap;
      line-height: 1.85;
      word-break: break-word;
    }

    .message-time {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .message-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    .source-toggle-btn {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .source-toggle-btn:hover {
      background: #dbe7ff;
    }

    .message-sources {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
    }

    .message-source-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fbfdff;
      padding: 12px 14px;
    }

    .source-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .source-title {
      font-weight: 700;
      color: #163a76;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
    }

    .source-meta {
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .source-content {
      white-space: pre-wrap;
      line-height: 1.75;
      word-break: break-word;
    }

    .composer {
      flex: 0 0 auto;
      padding: 10px 18px 16px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, #ffffff 100%);
    }

    .composer-shell {
      padding: 14px;
      border: 1px solid #d7e3f6;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .composer-shell label {
      display: inline-flex;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #274265;
    }

    .composer-input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .composer-input-row textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      resize: none;
      background: #fbfdff;
    }

    .composer-input-row .primary {
      flex: 0 0 auto;
      min-width: 94px;
      height: 52px;
      padding: 0 18px;
      border-radius: var(--radius-pill);
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 18px 16px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fbfdff;
      color: var(--muted);
      line-height: 1.7;
    }

    .empty-state {
      padding: 26px 22px;
      border: 1px dashed #cdddf3;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
      color: var(--text);
    }

    .empty-state h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .empty-state p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .suggestion-btn {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      text-align: left;
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }

    .suggestion-btn:hover {
      background: #f6f9ff;
      border-color: #b7cdfa;
    }

    .suggestion-btn span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 400;
    }

    @media (max-width: 1220px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats {
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-width: 1100px) {
      .chat-workspace {
        grid-template-columns: 1fr;
      }

      .file-list,
      .session-list {
        max-height: 280px;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 12px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .message-card {
        max-width: 100%;
      }

      .suggestion-grid {
        grid-template-columns: 1fr;
      }

      .composer-input-row {
        flex-direction: column;
        align-items: stretch;
      }

      .composer-input-row .primary {
        width: 100%;
      }

      .chat-header {
        flex-direction: column;
      }

      .chat-meta-stack {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="topbar">
      <div class="topbar-main">
        <h1>RAG 文档问答系统</h1>
        <p>聊天页专注提问和追问，资料范围可在独立资料库页面中单独维护。</p>
        <div class="app-switch">
          <button id="chatViewBtn" class="secondary switch-button active" type="button">聊天</button>
          <button id="libraryViewBtn" class="ghost switch-button" type="button">资料库</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">知识库文件数</div>
          <div id="totalFilesStat" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">当前勾选文件</div>
          <div id="selectedFilesStat" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最近命中片段</div>
          <div id="sourceCountStat" class="stat-value">0</div>
        </div>
      </div>
    </section>

    <section class="workspace">
      <section id="chatView" class="view">
        <section class="chat-workspace">
          <aside class="panel session-panel">
            <div class="panel-header">
              <h3>历史对话</h3>
              <p>继续之前的问题，或创建一条新的问答线程。</p>
            </div>
            <div class="panel-body">
              <div class="session-actions">
                <button id="newSessionBtn" class="primary" type="button">新建会话</button>
                <button id="refreshSessionsBtn" class="ghost" type="button">刷新</button>
                <button id="openLibraryBtn" class="secondary" type="button">进入资料库</button>
              </div>
              <div id="sessionsMeta" class="meta">正在加载会话列表...</div>
              <div id="sessionList" class="session-list">
                <div class="empty">暂无历史会话。</div>
              </div>
            </div>
          </aside>

          <section class="panel chat-panel">
            <div class="chat-header">
              <div>
                <h2>聊天窗口</h2>
                <p>围绕当前会话连续追问，答案会自动结合你勾选的知识库范围。</p>
              </div>
              <div class="chat-meta-stack">
                <div id="scopeSummary" class="hint">当前范围：全部文档</div>
                <div id="conversationMeta" class="section-meta">请选择或新建会话</div>
              </div>
            </div>

            <div class="chat-content">
              <div class="message-pane">
                <div id="conversationBox" class="empty">请选择左侧历史会话，或者点击“新建会话”后开始提问。</div>
              </div>

              <div class="composer">
                <div class="composer-shell">
                  <div class="field">
                    <label for="queryInput">向知识库提问</label>
                    <div class="composer-input-row">
                      <textarea id="queryInput" rows="1" placeholder="输入你的问题，按 Enter 发送，Shift + Enter 换行"></textarea>
                      <button id="askBtn" class="primary" type="button">发送问题</button>
                    </div>
                  </div>
                  <div class="composer-actions">
                    <div class="hint">将自动结合当前会话、分类和已勾选文件进行检索。</div>
                  </div>
                  <div id="chatStatus" class="status"></div>
                </div>
              </div>
            </div>
          </section>
        </section>
      </section>

    </section>
  </div>

  <script>
    const APP_USER_ID = "u123";
    const ALL_CATEGORY_VALUE = "__all__";
    const SELECTION_STORAGE_KEY = "rag_selection_scope_v1";
    const CATEGORY_OPTIONS = [
      { id: "study", name: "学习" },
      { id: "work", name: "工作" },
      { id: "life", name: "生活" }
    ];

    function loadSelectionScope() {
      try {
        const rawValue = window.localStorage.getItem(SELECTION_STORAGE_KEY);
        if (!rawValue) {
          return { activeCategoryId: ALL_CATEGORY_VALUE, selectedFileIds: [] };
        }

        const parsed = JSON.parse(rawValue);
        const activeCategoryId = typeof parsed.activeCategoryId === "string"
          ? parsed.activeCategoryId
          : ALL_CATEGORY_VALUE;
        const selectedFileIds = Array.isArray(parsed.selectedFileIds)
          ? parsed.selectedFileIds.filter((item) => typeof item === "string" && item.trim())
          : [];

        return { activeCategoryId: activeCategoryId, selectedFileIds: selectedFileIds };
      } catch (error) {
        return { activeCategoryId: ALL_CATEGORY_VALUE, selectedFileIds: [] };
      }
    }

    const persistedScope = loadSelectionScope();

    const state = {
      currentView: "chat",
      files: [],
      categories: [],
      activeCategoryId: persistedScope.activeCategoryId,
      selectedFileIds: new Set(persistedScope.selectedFileIds),
      sessions: [],
      activeSessionId: "",
      sessionMessages: [],
      lastSourceCount: 0,
      nextConversationRequestId: 0
    };

    const QUICK_PROMPTS = [
      {
        title: "总结当前知识库重点",
        description: "快速得到文档中的核心主题和关键结论"
      },
      {
        title: "比较文档里的几个概念",
        description: "适合做差异分析、优缺点整理和对比表述"
      },
      {
        title: "根据资料给出执行建议",
        description: "把文档内容转成可落地的步骤或方案"
      },
      {
        title: "提取文档中的关键信息",
        description: "按条目输出定义、时间、人物或方法"
      }
    ];

    const totalFilesStat = document.getElementById("totalFilesStat");
    const selectedFilesStat = document.getElementById("selectedFilesStat");
    const sourceCountStat = document.getElementById("sourceCountStat");
    const chatViewBtn = document.getElementById("chatViewBtn");
    const libraryViewBtn = document.getElementById("libraryViewBtn");
    const openLibraryBtn = document.getElementById("openLibraryBtn");

    const newSessionBtn = document.getElementById("newSessionBtn");
    const refreshSessionsBtn = document.getElementById("refreshSessionsBtn");
    const sessionsMeta = document.getElementById("sessionsMeta");
    const sessionList = document.getElementById("sessionList");

    const conversationBox = document.getElementById("conversationBox");
    const conversationMeta = document.getElementById("conversationMeta");
    const scopeSummary = document.getElementById("scopeSummary");
    const queryInput = document.getElementById("queryInput");
    const askBtn = document.getElementById("askBtn");
    const chatStatus = document.getElementById("chatStatus");

    function setStatus(element, message, type) {
      element.textContent = message || "";
      element.className = type ? `status ${type}` : "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function saveSelectionScope() {
      window.localStorage.setItem(SELECTION_STORAGE_KEY, JSON.stringify({
        activeCategoryId: state.activeCategoryId,
        selectedFileIds: getSelectedFileIds()
      }));
    }

    function formatDate(value) {
      if (!value) {
        return "时间未知";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function truncateText(value, maxLength = 42) {
      const text = String(value || "").trim();
      if (!text) {
        return "";
      }
      return text.length > maxLength ? `${text.slice(0, maxLength)}...` : text;
    }

    function generateSessionId() {
      return `session_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function normalizeCategory(file) {
      const predefined = CATEGORY_OPTIONS.find((category) => category.id === file.category_id);
      return {
        id: file.category_id || "study",
        name: predefined ? predefined.name : (file.category_name || file.category_id || "未分类")
      };
    }

    function getSelectedFileIds() {
      return Array.from(state.selectedFileIds);
    }

    function isPersistedSession(sessionId) {
      return Array.isArray(state.sessions)
        && state.sessions.some((session) => session.session_id === sessionId);
    }

    function getActiveCategory() {
      if (state.activeCategoryId === ALL_CATEGORY_VALUE) {
        return null;
      }
      return state.categories.find((category) => category.id === state.activeCategoryId) || null;
    }

    function rebuildCategories() {
      const categories = new Map(
        CATEGORY_OPTIONS.map((category) => [
          category.id,
          { id: category.id, name: category.name, count: 0 }
        ])
      );

      state.files.forEach((file) => {
        const category = normalizeCategory(file);
        if (!categories.has(category.id)) {
          categories.set(category.id, { id: category.id, name: category.name, count: 0 });
        }
        categories.get(category.id).count += 1;
      });

      state.categories = Array.from(categories.values()).filter((category) => category.count > 0);

      const validIds = new Set(state.categories.map((category) => category.id));
      if (state.activeCategoryId !== ALL_CATEGORY_VALUE && !validIds.has(state.activeCategoryId)) {
        state.activeCategoryId = ALL_CATEGORY_VALUE;
      }
    }

    function buildScopeSummaryText() {
      const activeCategory = getActiveCategory();
      const selectedCount = state.selectedFileIds.size;

      if (activeCategory && selectedCount > 0) {
        return `当前范围：${activeCategory.name}分类，已勾选 ${selectedCount} 个文件`;
      }

      if (activeCategory) {
        return `当前范围：${activeCategory.name}分类下全部文件`;
      }

      if (selectedCount > 0) {
        return `当前范围：已勾选 ${selectedCount} 个文件`;
      }

      return "当前范围：全部文档";
    }

    function updateStats() {
      totalFilesStat.textContent = String(state.files.length);
      selectedFilesStat.textContent = String(state.selectedFileIds.size);
      sourceCountStat.textContent = String(state.lastSourceCount);

      const activeCategory = getActiveCategory();

      if (scopeSummary) {
        scopeSummary.textContent = buildScopeSummaryText();
      }

      saveSelectionScope();
    }

    function getSessionTitle(session) {
      if (session && typeof session.title === "string" && session.title.trim()) {
        return session.title.trim();
      }

      if (session && session.session_id === state.activeSessionId) {
        const firstUserMessage = state.sessionMessages.find((message) => message.role === "user");
        if (firstUserMessage && firstUserMessage.content) {
          return truncateText(firstUserMessage.content, 24);
        }
      }

      if (session && session.isDraft) {
        return "新会话";
      }

      const sessionId = session && session.session_id ? session.session_id : "session";
      return `会话 ${sessionId.slice(-6)}`;
    }

    function getDisplayedSessions() {
      const sessions = Array.isArray(state.sessions) ? [...state.sessions] : [];
      const hasActiveSession = state.activeSessionId
        && sessions.some((session) => session.session_id === state.activeSessionId);

      if (!hasActiveSession && state.activeSessionId) {
        sessions.unshift({
          session_id: state.activeSessionId,
          title: "",
          created_at: "",
          updated_at: "",
          isDraft: true
        });
      }

      return sessions;
    }

    function getSessionPreview(session) {
      if (session && session.session_id === state.activeSessionId && state.sessionMessages.length > 0) {
        const lastMessage = state.sessionMessages[state.sessionMessages.length - 1];
        return truncateText(lastMessage.content, 38) || "当前会话";
      }

      if (session && session.updated_at) {
        return `最近更新：${formatDate(session.updated_at)}`;
      }

      return session && session.isDraft ? "等待首条消息" : "点击加载会话消息";
    }

    function getConversationTurnCount() {
      return state.sessionMessages.filter((message) => message.role === "user").length;
    }

    function renderConversationEmptyState(title, description) {
      return `
        <div class="empty-state">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(description)}</p>
          <div class="suggestion-grid">
            ${QUICK_PROMPTS.map((item) => `
              <button
                class="suggestion-btn"
                type="button"
                data-prompt-text="${escapeHtml(item.title)}"
              >
                ${escapeHtml(item.title)}
                <span>${escapeHtml(item.description)}</span>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderMessageSources(sources) {
      if (!Array.isArray(sources) || sources.length === 0) {
        return "";
      }

      return `
        <div class="message-sources">
          ${sources.map((item, index) => `
            <div class="message-source-card">
              <div class="source-top">
                <div class="source-title">${escapeHtml(item.file_name || "未知文件")}</div>
                <span class="badge">Top ${index + 1}</span>
              </div>
              <div class="source-meta">
                片段：${escapeHtml(item.chunk_id || "")} | 文件 ID：${escapeHtml(item.file_id || "")}
              </div>
              <div class="source-content">${escapeHtml(item.content || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderSessions() {
      const sessions = getDisplayedSessions();

      if (sessions.length === 0) {
        sessionList.innerHTML = '<div class="empty">暂无历史会话，点击“新建会话”后即可开始聊天。</div>';
        sessionsMeta.textContent = "暂无历史会话";
        return;
      }

      sessionList.innerHTML = sessions.map((session) => `
        <button
          class="session-item ${session.session_id === state.activeSessionId ? "active" : ""}"
          type="button"
          data-session-id="${escapeHtml(session.session_id)}"
        >
          <div class="session-title">${escapeHtml(getSessionTitle(session))}</div>
          <div class="session-preview">${escapeHtml(getSessionPreview(session))}</div>
        </button>
      `).join("");

      sessionsMeta.textContent = `共 ${state.sessions.length} 个已保存会话`;
    }

    function renderConversation() {
      if (!state.activeSessionId) {
        conversationBox.className = "";
        conversationBox.innerHTML = renderConversationEmptyState(
          "开始一段新的问答",
          "选择左侧会话继续聊天，或者直接点击下方建议问题开始提问。"
        );
        conversationMeta.textContent = "请选择或新建会话";
        return;
      }

      if (!Array.isArray(state.sessionMessages) || state.sessionMessages.length === 0) {
        conversationBox.className = "";
        conversationBox.innerHTML = renderConversationEmptyState(
          "准备好向知识库提问",
          "你可以直接输入问题，也可以从下面的示例开始，让页面看起来更像一个真正的 AI 助手。"
        );
        conversationMeta.textContent = `${getSessionTitle({ session_id: state.activeSessionId, isDraft: true })} · 暂无消息`;
        return;
      }

      conversationBox.className = "conversation-list";
      conversationBox.innerHTML = state.sessionMessages.map((message, index) => {
        const role = message.role === "assistant" ? "assistant" : "user";
        const roleLabel = role === "assistant" ? "助手" : "用户";
        const hasSources = role === "assistant" && Array.isArray(message.sources) && message.sources.length > 0;
        const actionHtml = hasSources ? `
          <div class="message-actions">
            <button
              class="source-toggle-btn"
              type="button"
              data-message-index="${index}"
            >
              ${message.sourcesExpanded ? "收起来源" : `来源 (${message.sources.length})`}
            </button>
          </div>
        ` : "";
        const sourcesHtml = hasSources && message.sourcesExpanded
          ? renderMessageSources(message.sources)
          : "";
        return `
          <div class="message-card ${role}">
            <div class="message-role">${roleLabel}</div>
            <div class="message-content">${escapeHtml(message.content || "")}</div>
            ${actionHtml}
            ${sourcesHtml}
            <div class="message-time">${escapeHtml(formatDate(message.created_at))}</div>
          </div>
        `;
      }).join("");

      conversationMeta.textContent = `当前会话 ${state.sessionMessages.length} 条消息，约 ${getConversationTurnCount()} 轮`;
      conversationBox.scrollTop = conversationBox.scrollHeight;
    }

    function setLastSourceCount(items) {
      state.lastSourceCount = Array.isArray(items) ? items.length : 0;
      updateStats();
    }

    function attachSourcesToAssistantMessage(requestId, items) {
      const nextMessages = Array.isArray(state.sessionMessages) ? [...state.sessionMessages] : [];
      for (let index = nextMessages.length - 1; index >= 0; index -= 1) {
        const message = nextMessages[index];
        if (message.role === "assistant" && message.requestId === requestId) {
          nextMessages[index] = {
            ...message,
            sources: Array.isArray(items) ? items : [],
            sourcesExpanded: false
          };
          break;
        }
      }
      state.sessionMessages = nextMessages;
      renderConversation();
    }

    function toggleMessageSources(messageIndex) {
      const index = Number(messageIndex);
      if (Number.isNaN(index) || !state.sessionMessages[index]) {
        return;
      }

      const nextMessages = [...state.sessionMessages];
      const target = nextMessages[index];
      if (!Array.isArray(target.sources) || target.sources.length === 0) {
        return;
      }

      nextMessages[index] = {
        ...target,
        sourcesExpanded: !target.sourcesExpanded
      };
      state.sessionMessages = nextMessages;
      renderConversation();
    }

    async function loadFiles() {
      try {
        const response = await fetch("/files");
        if (!response.ok) {
          throw new Error("文件列表加载失败");
        }

        const files = await response.json();
        state.files = Array.isArray(files) ? files : [];

        const validIds = new Set(state.files.map((file) => file.file_id));
        state.selectedFileIds = new Set(
          Array.from(state.selectedFileIds).filter((fileId) => validIds.has(fileId))
        );

        rebuildCategories();
        updateStats();
      } catch (error) {
        state.files = [];
        state.categories = [];
        state.activeCategoryId = ALL_CATEGORY_VALUE;
        updateStats();
      }
    }

    async function loadSessions() {
      sessionsMeta.textContent = "正在加载会话列表...";

      try {
        const response = await fetch(`/chat/sessions?user_id=${encodeURIComponent(APP_USER_ID)}`);
        if (!response.ok) {
          throw new Error("会话列表加载失败");
        }

        const sessions = await response.json();
        state.sessions = Array.isArray(sessions) ? sessions : [];

        if (!state.activeSessionId && state.sessions.length > 0) {
          state.activeSessionId = state.sessions[0].session_id;
        }

        renderSessions();

        if (state.sessions.length === 0) {
          sessionsMeta.textContent = "暂无历史会话";
        }
      } catch (error) {
        state.sessions = [];
        renderSessions();
        sessionsMeta.textContent = "暂无历史会话";
      }
    }

    async function loadSessionMessages(sessionId) {
      if (!sessionId) {
        state.sessionMessages = [];
        renderConversation();
        return;
      }

      if (!isPersistedSession(sessionId)) {
        state.sessionMessages = [];
        renderConversation();
        renderSessions();
        return;
      }

      conversationBox.className = "empty";
      conversationBox.textContent = "正在加载会话消息...";
      conversationMeta.textContent = "正在加载会话";

      try {
        const response = await fetch(`/chat/sessions/${encodeURIComponent(sessionId)}/${encodeURIComponent(APP_USER_ID)}/messages?limit=50`);
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "会话消息加载失败");
        }

        const messages = await response.json();
        if (state.activeSessionId !== sessionId) {
          return;
        }

        state.sessionMessages = Array.isArray(messages)
          ? messages
            .filter((item) => item && typeof item.content === "string")
            .map((item) => ({
              role: item.role === "assistant" ? "assistant" : "user",
              content: item.content,
              created_at: item.created_at || "",
              sources: [],
              sourcesExpanded: false
            }))
          : [];

        renderConversation();
        renderSessions();
      } catch (error) {
        if (state.activeSessionId !== sessionId) {
          return;
        }

        state.sessionMessages = [];
        conversationBox.className = "empty";
        conversationBox.textContent = error.message || "会话消息加载失败";
        conversationMeta.textContent = "会话加载失败";
      }
    }

    async function switchSession(sessionId) {
      if (!sessionId) {
        return;
      }

      state.activeSessionId = sessionId;
      state.lastSourceCount = 0;
      renderSessions();
      await loadSessionMessages(sessionId);
      updateStats();
    }

    function startNewSession() {
      state.activeSessionId = generateSessionId();
      state.sessionMessages = [];
      renderSessions();
      renderConversation();
      setLastSourceCount([]);
      setStatus(chatStatus, "已创建新会话，输入问题后会自动保存到历史记录。", "success");
      autoResizeQueryInput();
      queryInput.focus();
    }

    function setStreamingConversation(userContent, assistantContent, requestId) {
      const nextMessages = Array.isArray(state.sessionMessages) ? [...state.sessionMessages] : [];
      const lastUser = nextMessages[nextMessages.length - 2];
      const lastAssistant = nextMessages[nextMessages.length - 1];
      const isStreamingPair = lastUser
        && lastAssistant
        && lastUser.role === "user"
        && lastAssistant.role === "assistant"
        && lastUser.requestId === requestId
        && lastAssistant.requestId === requestId;

      if (isStreamingPair) {
        lastAssistant.content = assistantContent;
        lastAssistant.created_at = new Date().toISOString();
      } else {
        const createdAt = new Date().toISOString();
        nextMessages.push(
          { role: "user", content: userContent, created_at: createdAt, requestId: requestId, sources: [], sourcesExpanded: false },
          { role: "assistant", content: assistantContent, created_at: createdAt, requestId: requestId, sources: [], sourcesExpanded: false }
        );
      }

      state.sessionMessages = nextMessages;
      renderConversation();
      renderSessions();
    }

    function buildSearchPayload(query) {
      if (!state.activeSessionId) {
        state.activeSessionId = generateSessionId();
      }

      const activeCategory = getActiveCategory();
      const selectedFileIds = getSelectedFileIds();
      const categoryIds = activeCategory ? [activeCategory.id] : null;
      const fileIds = selectedFileIds.length > 0 ? selectedFileIds : null;
      let answerMetaText = "默认在全部文档中检索";

      if (categoryIds && fileIds) {
        answerMetaText = `限定分类“${activeCategory.name}”并按 ${fileIds.length} 个已选文件检索`;
      } else if (categoryIds) {
        answerMetaText = `限定分类“${activeCategory.name}”检索`;
      } else if (fileIds) {
        answerMetaText = `限定 ${fileIds.length} 个已选文件检索`;
      }

      return {
        payload: {
          query: query,
          session_id: state.activeSessionId,
          user_id: APP_USER_ID,
          file_ids: fileIds,
          category_ids: categoryIds
        },
        answerMetaText: answerMetaText
      };
    }

    function applyStreamEvent(event, requestConfig, streamState) {
      if (!event || typeof event !== "object") {
        return;
      }

      if (event.type === "meta") {
        conversationMeta.textContent = `${requestConfig.answerMetaText}，正在生成`;
        setLastSourceCount(Array.from({ length: Number(event.source_count || 0) }));
        return;
      }

      if (event.type === "token") {
        const chunk = String(event.content || "");
        streamState.answer += chunk;
        setStreamingConversation(streamState.query, streamState.answer || "模型正在生成回答...", streamState.requestId);
        return;
      }

      if (event.type === "done") {
        if (typeof event.answer === "string" && !streamState.answer) {
          streamState.answer = event.answer;
        }

        setStreamingConversation(streamState.query, streamState.answer || "模型没有返回内容。", streamState.requestId);

        attachSourcesToAssistantMessage(streamState.requestId, Array.isArray(event.sources) ? event.sources : []);
        setLastSourceCount(Array.isArray(event.sources) ? event.sources : []);

        conversationMeta.textContent = requestConfig.answerMetaText;
        streamState.done = true;
      }
    }

    function extractSseEvents(buffer) {
      const segments = buffer.split("\n\n");
      const remainder = segments.pop() || "";
      const events = [];

      segments.forEach((segment) => {
        const lines = segment
          .split("\n")
          .filter((line) => line.startsWith("data:"))
          .map((line) => line.slice(5).trimStart());

        if (lines.length === 0) {
          return;
        }

        try {
          events.push(JSON.parse(lines.join("\n")));
        } catch (error) {
          console.error("SSE 事件解析失败", error);
        }
      });

      return { events: events, remainder: remainder };
    }

    async function askQuestion() {
      const query = queryInput.value.trim();
      if (!query) {
        setStatus(chatStatus, "请输入问题后再发送。", "error");
        return;
      }

      const requestConfig = buildSearchPayload(query);
      const requestId = ++state.nextConversationRequestId;
      askBtn.disabled = true;
      queryInput.disabled = true;
      renderSessions();
      setLastSourceCount([]);
      setStreamingConversation(query, "模型正在生成回答...", requestId);
      setStatus(chatStatus, `正在检索并生成回答，当前会话：${state.activeSessionId}`, "");

      try {
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          const streamState = {
            query: query,
            requestId: requestId,
            answer: "",
            done: false
          };
          let responseOffset = 0;
          let buffer = "";

          const processIncomingText = async (text) => {
            if (!text) {
              return;
            }

            buffer += text;
            const parsed = extractSseEvents(buffer);
            buffer = parsed.remainder;

            parsed.events.forEach((event) => {
              applyStreamEvent(event, requestConfig, streamState);
            });

            await new Promise((nextFrame) => requestAnimationFrame(nextFrame));
          };

          xhr.open("POST", "/chat/stream", true);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.setRequestHeader("Accept", "text/event-stream");
          xhr.setRequestHeader("Cache-Control", "no-cache");

          xhr.onprogress = () => {
            const nextText = xhr.responseText.slice(responseOffset);
            responseOffset = xhr.responseText.length;
            processIncomingText(nextText).catch(reject);
          };

          xhr.onload = () => {
            if (xhr.status < 200 || xhr.status >= 300) {
              reject(new Error(xhr.responseText || "问答请求失败"));
              return;
            }

            const finalText = xhr.responseText.slice(responseOffset);
            processIncomingText(finalText)
              .then(() => {
                if (!streamState.done) {
                  reject(new Error("流式响应提前结束，请稍后重试。"));
                  return;
                }
                resolve();
              })
              .catch(reject);
          };

          xhr.onerror = () => {
            reject(new Error("流式连接失败，请检查网络或服务状态。"));
          };

          xhr.send(JSON.stringify(requestConfig.payload));
        });

        queryInput.value = "";
        autoResizeQueryInput();
        await loadSessions();
        renderSessions();
        renderConversation();
        setStatus(chatStatus, "回答完成，当前会话已写入历史记录。", "success");
      } catch (error) {
        setStreamingConversation(query, "请求失败，请检查后端服务和模型配置。", requestId);
        conversationMeta.textContent = "请求失败";
        setLastSourceCount([]);
        setStatus(chatStatus, error.message || "提问失败", "error");
      } finally {
        askBtn.disabled = false;
        queryInput.disabled = false;
        queryInput.focus();
      }
    }

    sessionList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-session-id]");
      if (!button) {
        return;
      }
      switchSession(button.dataset.sessionId || "");
    });

    conversationBox.addEventListener("click", (event) => {
      const button = event.target.closest("[data-message-index]");
      if (button) {
        toggleMessageSources(button.dataset.messageIndex || "");
        return;
      }

      const suggestionButton = event.target.closest("[data-prompt-text]");
      if (!suggestionButton) {
        return;
      }

      queryInput.value = suggestionButton.dataset.promptText || "";
      autoResizeQueryInput();
      queryInput.focus();
    });

    queryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });

    function autoResizeQueryInput() {
      queryInput.style.height = "auto";
      queryInput.style.height = `${Math.min(queryInput.scrollHeight, 140)}px`;
    }

    queryInput.addEventListener("input", autoResizeQueryInput);

    chatViewBtn.addEventListener("click", () => {
      window.location.href = "/";
    });
    libraryViewBtn.addEventListener("click", () => {
      window.location.href = "/library";
    });
    openLibraryBtn.addEventListener("click", () => {
      window.location.href = "/library";
    });
    newSessionBtn.addEventListener("click", startNewSession);
    refreshSessionsBtn.addEventListener("click", async () => {
      await loadSessions();
      if (state.activeSessionId && isPersistedSession(state.activeSessionId)) {
        await loadSessionMessages(state.activeSessionId);
      }
    });
    askBtn.addEventListener("click", askQuestion);

    async function initializePage() {
      updateStats();
      renderSessions();
      renderConversation();
      setLastSourceCount([]);
      autoResizeQueryInput();

      await Promise.all([loadFiles(), loadSessions()]);

      if (state.activeSessionId && isPersistedSession(state.activeSessionId)) {
        await loadSessionMessages(state.activeSessionId);
      } else {
        startNewSession();
      }
    }

    initializePage();
  </script>
</body>
</html>
